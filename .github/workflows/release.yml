name: Release

# On a version tag (e.g. v0.1.0), compile standalone provider binaries for every platform and
# bundle the harness Web Component, then publish them all as GitHub Release assets.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, e.g. v0.1.0"
        required: true

permissions:
  contents: write # create releases + tags

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Verify (check + tests)
        run: |
          deno task check
          deno task test
          (cd harness && deno task check && deno task test)

      - name: Compile provider binaries (all platforms)
        run: |
          mkdir -p dist
          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin \
            x86_64-pc-windows-msvc; do
            echo "::group::compile $target"
            deno compile -A --include static --target "$target" \
              --output "dist/rawhideidentity-$target" main.tsx
            echo "::endgroup::"
          done

      - name: Bundle harness (browser Web Component)
        run: |
          deno bundle --platform browser --minify harness/rawhide-harness.ts -o dist/rawhide-harness.min.js
          deno bundle --platform browser harness/rawhide-harness.ts -o dist/rawhide-harness.js

      - name: Checksums
        run: (cd dist && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" dist/* \
            --title "${{ steps.meta.outputs.tag }}" \
            --generate-notes
